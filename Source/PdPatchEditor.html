<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0b0f0d;color:#e9efe8;font:13px -apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif}
#bar{height:42px;display:flex;align-items:center;gap:8px;padding:0 10px;background:#111713;border-bottom:1px solid #26312c;box-sizing:border-box}
button{height:28px;min-width:54px;border:1px solid #2f3c35;border-radius:7px;background:#17201b;color:#e9efe8;font-weight:700}
button.active{background:#ff744f;color:#130b08;border-color:#ffb199}
button#parentPatch{display:none;min-width:70px}
body.nested button#parentPatch{display:inline-block}
select{height:28px;max-width:180px;border:1px solid #2f3c35;border-radius:7px;background:#17201b;color:#e9efe8;font-weight:700;padding:0 7px}
input{height:28px;width:112px;border:1px solid #2f3c35;border-radius:7px;background:#0e1511;color:#e9efe8;font-weight:700;padding:0 8px;box-sizing:border-box}
input::placeholder{color:#68756e}
#status{margin-left:auto;color:#8d9a93;font-weight:650;white-space:nowrap}
#wrap{position:absolute;left:0;right:0;top:42px;bottom:0}
#patchsvg{width:100%;height:100%;background-color:#f5f2e8;background-image:linear-gradient(rgba(25,35,30,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(25,35,30,.08) 1px,transparent 1px),linear-gradient(rgba(25,35,30,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(25,35,30,.16) 1px,transparent 1px);background-size:20px 20px,20px 20px,100px 100px,100px 100px;cursor:crosshair}
body.run #patchsvg{cursor:default}
#sourceText{display:none;position:absolute;inset:0;box-sizing:border-box;border:0;outline:0;resize:none;padding:16px;background:#0b0f0d;color:#e9efe8;font:13px Menlo,Consolas,monospace;line-height:1.45}
#wrap.source #patchsvg{display:none}
#wrap.source #sourceText{display:block}
.cord{stroke:#1c211f;stroke-width:2;fill:none}
.cord.selected{stroke:#ff744f;stroke-width:3}
.cord.active{stroke:#2ca9ff;stroke-width:3.4;filter:drop-shadow(0 0 3px rgba(44,169,255,.65))}
.box rect{stroke:#111;stroke-width:1.4;fill:#fbfaf3}
.box.msg rect{fill:#fff0b6}
.box.comment rect{fill:transparent;stroke:transparent}
.box.selected rect{stroke:#ff744f;stroke-width:2.4}
.box.flash rect{fill:#ffcf5a}
.box text{font:13px "DejaVu Sans Mono","Menlo",monospace;fill:#111;dominant-baseline:middle;pointer-events:none}
.box.gui rect{fill:#eef7ff}
.box.gui .face{stroke:#111;stroke-width:1.5;fill:none;pointer-events:none}
.box.gui circle.face{fill:#f8fbff}
.box.gui .thumb{fill:#111;stroke:#111;stroke-width:1;pointer-events:none}
.box.gui .guiLabel{font:11px "DejaVu Sans Mono","Menlo",monospace;fill:#111;dominant-baseline:hanging;pointer-events:none}
.box.array rect{fill:#f4fbff;stroke:#23556f;stroke-width:1.8}
.box.array .arrayWave{stroke:#1677a8;stroke-width:1.8;fill:none;pointer-events:none}
.box.array .arrayFill{fill:rgba(22,119,168,.1);stroke:none;pointer-events:none}
.box.array text{fill:#10232d}
.box.scalar rect{fill:#f8f2ff;stroke:#7e4bc8;stroke-width:1.7}
.box.scalar text{fill:#2c174f}
.box.scalar .scalarShape{fill:none;stroke:#7e4bc8;stroke-width:2;pointer-events:none}
.box.scalar .scalarFill{fill:rgba(126,75,200,.16);stroke:#7e4bc8;stroke-width:1.5;pointer-events:none}
.box.scalar .scalarText{font:10px "DejaVu Sans Mono","Menlo",monospace;fill:#2c174f;dominant-baseline:middle;pointer-events:none}
.box.scalar .scalarPlotPoint{fill:#f8f2ff;stroke:#7e4bc8;stroke-width:1.5;pointer-events:none}
.box.scalar > text:not(.scalarText){display:none}
.box.datastruct rect{fill:#f4f0ff;stroke:#5c4ab4;stroke-width:1.6}
.box.datastruct text{fill:#24155d}
.box.subpatch rect{fill:#f7f3ff;stroke:#5b4a8f;stroke-width:1.7}
.box.subpatch.gop rect{fill:#eefbf6;stroke:#248a63}
.box.subpatch.gop .gopTitle{font:11px "DejaVu Sans Mono","Menlo",monospace;fill:#195c45;dominant-baseline:hanging;pointer-events:none}
.box rect.port{fill:#151915;cursor:crosshair;stroke:#151915;stroke-width:.45;shape-rendering:crispEdges;pointer-events:none;vector-effect:non-scaling-stroke}
.box rect.portHit{fill:transparent;stroke:none;cursor:crosshair;pointer-events:all;vector-effect:non-scaling-stroke}
.box.selected rect.port{fill:#151915;stroke:#151915;stroke-width:.45}
.box.selected rect.portHit{fill:transparent;stroke:transparent;stroke-width:0}
.box rect.port:hover{fill:#ff744f;stroke:#ff744f}
body.run .port{display:none}
body.run .box rect{cursor:pointer}
.ghost{stroke:#ff744f;stroke-width:2.4;stroke-dasharray:4 3;fill:none}
.marquee{stroke:#ff744f;stroke-width:1.2;stroke-dasharray:5 4;fill:rgba(255,116,79,.12)}
#objectMenu{position:fixed;display:none;z-index:10;width:268px;max-height:360px;background:#111713;border:1px solid #344239;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.34);padding:8px;box-sizing:border-box}
#objectMenu.open{display:block}
#menuSearch{width:100%;margin-bottom:7px}
#menuList{max-height:300px;overflow:auto}
.menuGroup{color:#819087;font-size:11px;font-weight:800;text-transform:uppercase;margin:9px 6px 4px}
.menuItem{height:28px;display:flex;align-items:center;padding:0 8px;border-radius:6px;color:#e9efe8;font-weight:700;cursor:default}
.menuItem:hover,.menuItem.active{background:#ff744f;color:#130b08}
.menuItem.disabled{opacity:.38;pointer-events:none}
#inlineEdit{position:fixed;display:none;z-index:12;height:28px;border:2px solid #ff744f;border-radius:3px;background:#fffdf5;color:#111;font:13px "DejaVu Sans Mono","Menlo",monospace;padding:2px 8px;box-sizing:border-box}
#props{position:fixed;display:none;z-index:11;right:14px;top:56px;width:240px;background:#111713;border:1px solid #344239;border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,.34);padding:10px;box-sizing:border-box}
#props.open{display:block}
#props h3{margin:0 0 8px;font-size:13px;color:#e9efe8}
#props label{display:block;margin:7px 0 3px;color:#8d9a93;font-size:11px;font-weight:800;text-transform:uppercase}
#props input{width:100%;height:26px}
#props .row{display:flex;gap:6px;margin-top:10px}
#props .row button{flex:1;min-width:0}
.box.unknown rect{stroke:#c72c41;stroke-width:2}
</style>
</head>

  <button id="helpObj">help</button>

</div>

<div id="objectMenu"><input id="menuSearch" placeholder="find object"><div id="menuList"></div></div>

  <label>Label Y</label><input id="propLabelY">
  <label>Font face</label><input id="propFontFace">
  <label>Font size</label><input id="propFontSize">
  <label>Receive</label><input id="propReceive">
  <label>Send</label><input id="propSend">
  <label>Width</label><input id="propWidth">
  <label>Height</label><input id="propHeight">
  <label>Minimum</label><input id="propMin">
  <label>Maximum</label><input id="propMax">
  <label>Steps</label><input id="propSteps">
  <label>Init</label><input id="propInit">
  <label>Steady on click</label><input id="propSteady">
  <label>Background</label><input id="propBg" placeholder="#fcfcfc">
  <label>Foreground</label><input id="propFg" placeholder="#000000">
  <label>Label color</label><input id="propLc" placeholder="#000000">

</div>

function esc(s){return String(s).replace(/\\/g,"\\\\").replace(/\$/g,"\\$").replace(/,/g,"\\,").replace(/;/g,"\\;");}
function escAtom(s){return esc(s).replace(/ /g,"\\ ");}
function unesc(s){return String(s).replace(/\\;/g,";").replace(/\\,/g,",").replace(/\\\$/g,"$").replace(/\\ /g," ").replace(/\\\\/g,"\\");}
function stripSemi(s){s=s.trim();return s.endsWith(";")?s.slice(0,-1):s;}
function pdSourceRecords(text){
 const records=[];
 let current="",slashes=0;
 for(const ch of String(text||"").replace(/\r\n?/g,"\n")){
  current+=ch;
  if(ch===";"&&slashes%2===0){const record=current.trim();if(record)records.push(record);current="";}
  if(ch==="\\")slashes++;else slashes=0;
 }
 const tail=current.trim();if(tail)records.push(tail);
 return records;
}
function splitPdAtoms(s){
 const atoms=[];
 let current="",escaping=false;
 for(const ch of String(s||"")){
  if(escaping){current+=ch;escaping=false;continue;}
  if(ch==="\\"){escaping=true;continue;}
  if(/\s/.test(ch)){
   if(current.length){atoms.push(current);current="";}
   continue;
  }
  current+=ch;
}
if(escaping)current+="\\";
if(current.length)atoms.push(current);
